<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis 15</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to bottom, #000, #1a1a1a);
      color: white;
      text-align: center;
    }

    .portada {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: url('fondo.jpg') center/cover;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
    }

    .btn {
      background: #ff4da6;
      border: none;
      padding: 15px 25px;
      color: white;
      font-size: 18px;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
    }

    .seccion {
      padding: 50px 20px;
    }

    .contador {
      font-size: 30px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- PORTADA -->
  <section class="portada">
    <h1>Sabrina</h1>
    <p>Mis 15 años</p>
    <button class="btn" onclick="mostrarInvitacion()">Ver invitación</button>
  </section>

  <!-- INVITACIÓN -->
  <section class="seccion" id="info" style="display:none;">
    <h2>Te invito a mi fiesta</h2>
    <p>📅 2 de mayo 2026</p>
    <p>📍 Salón de eventos</p>
    <p>⏰ 21:00 hs</p>

    <div class="contador" id="countdown"></div>
  </section>

  <!-- MÚSICA -->
  <audio id="musica" src="only.mp3"></audio>

  <script>
    function mostrarInvitacion() {
      document.getElementById("info").style.display = "block";
      document.getElementById("musica").play();
      iniciarContador();
    }

    function iniciarContador() {
      const fecha = new Date("may 2, 2026 21:00:00").getTime();
      const x = setInterval(() => {
        const ahora = new Date().getTime();
        const distancia = fecha - ahora;

        const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));

        document.getElementById("countdown").innerHTML =
          "Faltan " + dias + " días";

      }, 1000);
    }
  </script>

</body>
</html>
